   <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出張命令・報告書 / 旅費精算書</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho&display=swap');

        :root {
            --a4-width: 210mm;
            --a4-height: 297mm;
        }

        body {
            background-color: #f3f4f6;
            font-family: 'Shippori Mincho', serif;
            margin: 0;
            padding: 0;
        }

        /* プレビュー用の用紙スタイル */
        .paper {
            width: var(--a4-width);
            min-height: var(--a4-height);
            background: white;
            margin: 20px auto;
            padding: 12mm 15mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            color: #1a1a1a;
            font-size: 14px;
        }

        /* 印刷・PDF出力時の設定 */
        @media print {
            body { background: none; }
            .paper { margin: 0; box-shadow: none; width: var(--a4-width); height: var(--a4-height); padding: 10mm 15mm; }
            .no-print { display: none !important; }
        }

        /* 承認印テーブル */
        .hanko-table {
            border-collapse: collapse;
            float: right;
            margin-bottom: 10px;
        }
        .hanko-table td {
            border: 1px solid #000;
            width: 48px;
            height: 48px;
            text-align: center;
            vertical-align: middle;
            font-size: 10px;
        }
        .hanko-header {
            height: 20px !important;
            background-color: #f8f8f8;
        }

        /* 入力用下線 */
        .input-line {
            border-bottom: 1px solid #000;
            display: inline-block;
            outline: none;
            padding: 0 5px;
            text-align: center;
        }

        /* 日付用の下線なしスタイル */
        .date-input {
            border-bottom: none !important;
            min-width: 1.5em;
        }

        /* 均等割付（両横揃え）用 */
        .justify-label {
            display: inline-block;
            text-align: justify;
            text-align-last: justify;
            vertical-align: bottom;
        }

        /* ラベル幅の統一設定 */
        .name-label-width { width: 80px; }
        .name-field {
            width: 200px;
            text-align: left;
        }
        
        /* 印鑑スペースの幅を固定 */
        .hanko-space {
            width: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .full-underline {
            border-bottom: 1px solid #000;
            width: 100%;
            display: inline-block;
            min-height: 1.6em;
            outline: none;
            margin-bottom: 4px;
        }

        /* 精算表スタイル */
        .amount-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .amount-table th {
            border: 1px solid #000;
            width: 140px; 
            height: 42px;
            padding: 0 15px;
            font-weight: normal;
        }
        .amount-table td {
            border: 1px solid #000;
            height: 42px;
            padding: 0;
        }

        /* 詳細と金額の分割セル（1/3 split） */
        .split-cell {
            display: flex;
            height: 100%;
            width: 100%;
        }
        .split-left {
            width: 33.333%;
            border-right: 1px solid #000;
            padding: 0 10px;
            display: flex;
            align-items: center;
            outline: none;
        }
        .split-right {
            width: 66.666%;
            padding: 0 10px;
            display: flex;
            align-items: center;
            outline: none;
            font-family: 'Noto Sans JP', sans-serif;
        }

        /* 操作パネル */
        .controls {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-bottom: 1px solid #e5e7eb;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-update { background: #3b82f6; color: white; border: none; }
        .btn-update:hover { background: #2563eb; }
        .btn-print { background: #10b981; color: white; border: none; }
        .btn-print:hover { background: #059669; }
        .btn-pdf { background: #ef4444; color: white; border: none; }
        .btn-pdf:hover { background: #dc2626; }

        /* 入力欄の間隔調整 */
        .era-input { width: 8em; } 
        .year-input { width: 2.5em; }
        .month-input { width: 2em; }
        .day-input { width: 2em; }
        .time-input { width: 2.5em; }
        
        .datetime-container {
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-size: 13px;
        }

        .message-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: #1f2937;
            color: white;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="controls no-print">
        <button class="btn btn-update" onclick="saveContent()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v13a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            編集内容を保存
        </button>
        <button class="btn btn-print" onclick="window.print()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            印刷
        </button>
        <button class="btn btn-pdf" onclick="generatePDF()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            PDF保存
        </button>
    </div>

    <div id="capture-area" class="paper">
        <!-- 承認印テーブル -->
        <table class="hanko-table">
            <tr class="hanko-header">
                <td>院 長</td>
                <td>事務長</td>
                <td>所属長</td>
                <td>総 務</td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </table>

        <!-- タイトル -->
        <div class="clear-both pt-6 text-center">
            <h1 class="text-3xl tracking-[1em] font-bold mb-4 ml-[1em]">出張命令・報告書</h1>
        </div>

        <div class="mt-6 leading-relaxed">
            <div>特定医療法人 清和会</div>
            <div class="flex items-end mt-2">
                <span class="tracking-[0.4em]">院長 駒橋 徹 殿</span>
            </div>
        </div>

        <!-- 日付・氏名エリア -->
        <div class="text-right mt-2 space-y-2">
            <div class="pr-[38px]">
                <span class="input-line era-input date-input" contenteditable="true">令和</span> 年 
                <span class="input-line month-input date-input" contenteditable="true"></span> 月 
                <span class="input-line day-input date-input" contenteditable="true"></span> 日
            </div>
            <div class="flex justify-end items-center gap-2">
                <span class="justify-label name-label-width">役職名</span> 
                <span class="input-line name-field" contenteditable="true"></span>
                <div class="hanko-space"></div>
            </div>
            <div class="flex justify-end items-center gap-2">
                <span class="justify-label name-label-width">氏名</span> 
                <span class="input-line name-field" contenteditable="true"></span>
                <div class="hanko-space">
                    <span class="text-xs border border-black rounded-full p-1 inline-flex items-center justify-center w-6 h-6">印</span>
                </div>
            </div>
        </div>

        <!-- 詳細エリア -->
        <div class="mt-6 space-y-4">
            <div class="flex items-center gap-4">
                <span class="justify-label name-label-width flex-shrink-0">日時</span>
                <div class="datetime-container flex-grow">
                    <span class="input-line era-input date-input" contenteditable="true">令和</span> 年 
                    <span class="input-line month-input date-input" contenteditable="true"></span> 月 
                    <span class="input-line day-input date-input" contenteditable="true"></span> 日 
                    <span class="input-line time-input date-input" contenteditable="true"></span> 時より 
                    <span class="input-line era-input date-input" contenteditable="true">令和</span> 年 
                    <span class="input-line month-input date-input" contenteditable="true"></span> 月 
                    <span class="input-line day-input date-input" contenteditable="true"></span> 日 
                    <span class="input-line time-input date-input" contenteditable="true"></span> 時まで
                </div>
            </div>
            <div class="flex items-baseline gap-4">
                <span class="justify-label name-label-width flex-shrink-0">場所</span>
                <span class="full-underline" contenteditable="true"></span>
            </div>
            <div class="flex items-baseline gap-4">
                <span class="justify-label name-label-width flex-shrink-0">目的</span>
                <span class="full-underline" contenteditable="true"></span>
            </div>
            <div class="flex flex-col">
                <span class="justify-label name-label-width">報告事項</span>
                <div class="mt-1">
                    <span class="full-underline" contenteditable="true"></span>
                    <span class="full-underline" contenteditable="true"></span>
                    <span class="full-underline" contenteditable="true"></span>
                    <span class="full-underline" contenteditable="true"></span>
                    <span class="full-underline" contenteditable="true"></span>
                </div>
            </div>
        </div>

        <!-- 旅費精算書セクション -->
        <div class="mt-10 border-t-2 border-dashed border-gray-300 pt-8">
            <div class="text-center">
                <h1 class="text-3xl tracking-[1em] font-bold mb-4 ml-[1em]">旅費精算書</h1>
            </div>

            <div class="text-right mt-4 space-y-2">
                <div class="pr-[38px]">
                    <span class="input-line era-input date-input" contenteditable="true">令和</span> 年 
                    <span class="input-line month-input date-input" contenteditable="true"></span> 月 
                    <span class="input-line day-input date-input" contenteditable="true"></span> 日
                </div>
                <div class="flex justify-end items-center gap-2">
                    <span class="justify-label name-label-width">役職名</span> 
                    <span class="input-line name-field" contenteditable="true"></span>
                    <div class="hanko-space"></div>
                </div>
                <div class="flex justify-end items-center gap-2">
                    <span class="justify-label name-label-width">氏名</span> 
                    <span class="input-line name-field" contenteditable="true"></span>
                    <div class="hanko-space">
                        <span class="text-xs border border-black rounded-full p-1 inline-flex items-center justify-center w-6 h-6">印</span>
                    </div>
                </div>
            </div>

            <div class="mt-6 text-center text-lg tracking-widest">
                下記の精算金額を領収致しました
            </div>

            <table class="amount-table mt-4">
                <tr>
                    <th><span class="justify-label w-full">交通費</span></th>
                    <td>
                        <div class="split-cell">
                            <div class="split-left" contenteditable="true"></div>
                            <div class="split-right" contenteditable="true"></div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th class="leading-tight"><span class="justify-label w-full">タクシー代</span><br><span class="text-[9px]">(領収証添付)</span></th>
                    <td>
                        <div class="split-cell">
                            <div class="split-left" contenteditable="true"></div>
                            <div class="split-right" contenteditable="true"></div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th><span class="justify-label w-full">日当</span></th>
                    <td>
                        <div class="split-cell">
                            <div class="split-left" contenteditable="true"></div>
                            <div class="split-right" contenteditable="true"></div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th><span class="justify-label w-full">宿泊料</span></th>
                    <td>
                        <div class="split-cell">
                            <div class="split-left" contenteditable="true"></div>
                            <div class="split-right" contenteditable="true"></div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th class="flex items-center justify-between px-4">
                        <span class="justify-label flex-grow text-left">仮払金</span>
                        <span class="font-bold ml-2">△</span>
                    </th>
                    <td>
                        <div class="split-cell">
                            <div class="split-left" contenteditable="true"></div>
                            <div class="split-right" contenteditable="true"></div>
                        </div>
                    </td>
                </tr>
                <tr class="bg-gray-50">
                    <th><span class="justify-label w-full font-bold">精算金額</span></th>
                    <td>
                        <div class="split-cell">
                            <div class="split-left font-bold" contenteditable="true"></div>
                            <div class="split-right font-bold" contenteditable="true"></div>
                        </div>
                    </td>
                </tr>
            </table>

            <!-- 決済日付 -->
            <div class="text-right mt-4 pr-[38px]">
                <span class="input-line era-input date-input" contenteditable="true">令和</span> 年 
                <span class="input-line month-input date-input" contenteditable="true"></span> 月 
                <span class="input-line day-input date-input" contenteditable="true"></span> 日&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;決済
            </div>
        </div>
    </div>

    <!-- 通知用メッセージボックス -->
    <div id="message" class="message-box"></div>

    <script>
        // ブラウザのローカルストレージへ保存
        function saveContent() {
            const content = document.getElementById('capture-area').innerHTML;
            localStorage.setItem('travel_expense_data', content);
            showMessage('編集内容を保存しました。');
        }

        function showMessage(msg) {
            const box = document.getElementById('message');
            box.innerText = msg;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 3000);
        }

        // html2pdfを利用したPDF生成（A4 1ページに収める調整を含む）
        async function generatePDF() {
            const element = document.getElementById('capture-area');
            const originalHeight = element.style.height;
            // 1ページに確実に収めるための微調整
            element.style.height = '296.5mm';
            
            const opt = {
                margin: 0,
                filename: '出張命令・報告・精算書.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(element).save();
                showMessage('PDFを保存しました。');
            } catch (error) {
                showMessage('PDF保存中にエラーが発生しました。');
            } finally {
                element.style.height = originalHeight;
            }
        }
    </script>
</body>
</html>
